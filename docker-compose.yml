version: '3.8'

services:
  simulation-app:
    build: .
    container_name: bio-simulation-private
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_PASSWORD=${APP_PASSWORD:-organoid2026}
    restart: always
    volumes:
      - ./.env:/app/.env
